<!doctype html>
<html lang="en">
  <head>
    <!-- Charset & Viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title & Description (Essential for SEO) -->
    <title>The Move | Interior Design Studio in Myanmar</title>
    <meta name="description" content="The Move is a creative interior design studio based in Myanmar, crafting modern, functional, and aesthetic spaces for homes and businesses." />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Canonical URL  -->
    <link rel="canonical" href="https://themovearchids.vercel.app/" />

    <!-- Robots (Allow indexing by search engines) -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://themovearchids.vercel.app/" />
    <meta property="og:title" content="The Move | Interior Design Studio in Myanmar" />
    <meta property="og:description" content="Explore modern, functional, and aesthetic interior designs by The Move — based in Myanmar." />
    <meta property="og:image" content="https://themovearchids.vercel.app/preview.jpg" />
    <meta property="og:site_name" content="The Move" />

    <!-- Social Profile -->
    <link rel="me" href="https://www.facebook.com/themovearchids" />

    <!-- JSON-LD Structured Data for Google -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "The Move",
        "image": "https://themovearchids.vercel.app/preview.jpg",
        "url": "https://themovearchids.vercel.app/",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Yangon",
          "addressCountry": "MM"
        },
        "description": "The Move is a creative interior design studio based in Myanmar, crafting modern, functional, and aesthetic spaces for homes and businesses.",
        "sameAs": [
          "https://www.facebook.com/themovearchids"
        ]
      }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
